<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scanner Magazzino — My Logistic Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0a0f1a;
      --card:   #111827;
      --line:   #1f2937;
      --accent: #facc15;
      --dim:    #4b5563;
      --text:   #f9fafb;
      --muted:  #6b7280;
      --green:  #4ade80;
      --red:    #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* ── Sfondo animato ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 50%, rgba(250,204,21,.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 30%, rgba(74,222,128,.03) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ── */
    .wrap {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      text-align: center;
    }
    .brand {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }
    .title span { color: var(--accent); }

    /* ── Scanner box ── */
    .scanner-box {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      position: relative;
      overflow: hidden;
    }

    /* angoli decorativi */
    .scanner-box::before,
    .scanner-box::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--accent);
      border-style: solid;
      opacity: .5;
    }
    .scanner-box::before { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .scanner-box::after  { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

    /* ── Icona scanner ── */
    .scan-icon {
      position: relative;
      width: 96px; height: 96px;
    }
    .scan-icon svg {
      width: 100%; height: 100%;
      opacity: .9;
    }
    .scan-line {
      position: absolute;
      left: 12px; right: 12px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent);
      border-radius: 2px;
      top: 12px;
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%   { top: 12px; opacity: 1; }
      50%  { top: calc(100% - 14px); opacity: 1; }
      100% { top: 12px; opacity: 1; }
    }

    /* ── Label istruzione ── */
    .instruction {
      text-align: center;
    }
    .instruction-main {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .instruction-sub {
      font-size: .82rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* ── Input nascosto ma sempre attivo ── */
    .hidden-input {
      position: absolute;
      opacity: 0;
      width: 1px; height: 1px;
      pointer-events: none;
    }

    /* ── Buffer display ── */
    .buffer-wrap {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
      transition: border-color .2s;
    }
    .buffer-wrap.active { border-color: var(--accent); }
    .buffer-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background .2s;
    }
    .buffer-wrap.active .buffer-dot { background: var(--accent); animation: blink .6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .buffer-text {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: .08em;
      flex: 1;
      min-height: 24px;
    }
    .buffer-text.empty { color: var(--dim); font-size: .82rem; font-family: 'Syne', sans-serif; }

    /* ── Feedback stato ── */
    .feedback {
      width: 100%;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: .9rem;
      font-weight: 700;
      text-align: center;
      display: none;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .feedback.ok  { background: rgba(74,222,128,.1);  color: var(--green); border: 1px solid rgba(74,222,128,.2); }
    .feedback.err { background: rgba(248,113,113,.1); color: var(--red);   border: 1px solid rgba(248,113,113,.2); }

    /* ── Ultimo accesso ── */
    .last-scan {
      font-size: .75rem;
      color: var(--dim);
      font-family: 'DM Mono', monospace;
      text-align: center;
      min-height: 18px;
    }

    /* ── Clock ── */
    .clock {
      font-size: .8rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: .06em;
    }

    /* ── Pulsante focus manuale ── */
    .refocus-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: .75rem;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .refocus-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="brand">My Logistic Group</div>
    <div class="title">Scanner <span>Giro</span></div>
  </div>

  <!-- Box scanner -->
  <div class="scanner-box" onclick="refocus()">

    <!-- Icona QR animata -->
    <div class="scan-icon">
      <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- angolo TL -->
        <rect x="8"  y="8"  width="28" height="28" rx="4" stroke="#facc15" stroke-width="3" fill="none"/>
        <rect x="16" y="16" width="12" height="12" rx="2" fill="#facc15" opacity=".6"/>
        <!-- angolo TR -->
        <rect x="60" y="8"  width="28" height="28" rx="4" stroke="#4b5563" stroke-width="3" fill="none"/>
        <rect x="68" y="16" width="12" height="12" rx="2" fill="#4b5563" opacity=".4"/>
        <!-- angolo BL -->
        <rect x="8"  y="60" width="28" height="28" rx="4" stroke="#4b5563" stroke-width="3" fill="none"/>
        <rect x="16" y="68" width="12" height="12" rx="2" fill="#4b5563" opacity=".4"/>
        <!-- moduli centro -->
        <rect x="44" y="44" width="8"  height="8"  rx="1" fill="#facc15" opacity=".5"/>
        <rect x="56" y="44" width="8"  height="8"  rx="1" fill="#4b5563" opacity=".3"/>
        <rect x="68" y="56" width="8"  height="8"  rx="1" fill="#4b5563" opacity=".3"/>
        <rect x="44" y="56" width="8"  height="8"  rx="1" fill="#4b5563" opacity=".3"/>
        <rect x="56" y="68" width="8"  height="8"  rx="1" fill="#facc15" opacity=".5"/>
        <rect x="68" y="44" width="8"  height="8"  rx="1" fill="#4b5563" opacity=".3"/>
        <rect x="44" y="68" width="8"  height="8"  rx="1" fill="#4b5563" opacity=".3"/>
        <rect x="56" y="56" width="8"  height="8"  rx="1" fill="#facc15" opacity=".7"/>
        <rect x="68" y="68" width="8"  height="8"  rx="1" fill="#4b5563" opacity=".3"/>
      </svg>
      <div class="scan-line"></div>
    </div>

    <!-- Istruzione -->
    <div class="instruction">
      <div class="instruction-main">Scannerizza il QR Code del driver</div>
      <div class="instruction-sub">apertura e chiusura automatica del giro</div>
    </div>

    <!-- Buffer visivo -->
    <div class="buffer-wrap" id="bufferWrap">
      <span class="buffer-dot"></span>
      <span class="buffer-text empty" id="bufferText">In attesa scansione…</span>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Input nascosto sempre in focus -->
    <input
      class="hidden-input"
      id="scanInput"
      type="text"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >

  </div>

  <!-- Ultimo accesso + clock -->
  <div class="last-scan" id="lastScan">Nessuna scansione ancora</div>
  <div class="clock" id="clock"></div>

  <!-- Pulsante refocus manuale -->
  <button class="refocus-btn" onclick="refocus()">↺ Riattiva scanner</button>

</div>

<script>
// ── Config ────────────────────────────────────────────────────
// URL base della tua pagina GitHub Pages
const BASE_URL = 'https://mylogisticgroup.github.io/giro/';

// Timeout in ms entro cui lo scanner finisce di "digitare" il codice
// Gli scanner USB inviano tutto in <100ms — 300ms è sicuro
const SCAN_TIMEOUT = 300;

// ── Stato ─────────────────────────────────────────────────────
const input      = document.getElementById('scanInput');
const bufferWrap = document.getElementById('bufferWrap');
const bufferText = document.getElementById('bufferText');
const feedback   = document.getElementById('feedback');
const lastScan   = document.getElementById('lastScan');

let buffer  = '';
let timer   = null;

// ── Focus permanente ─────────────────────────────────────────
function refocus() { input.focus(); }

// Rimane sempre in focus
input.addEventListener('blur', () => {
  setTimeout(refocus, 100);
});
document.addEventListener('click', refocus);
document.addEventListener('keydown', refocus);

// Focus immediato all'avvio
window.addEventListener('load', refocus);

// ── Lettura scanner ──────────────────────────────────────────
input.addEventListener('input', () => {
  buffer = input.value.trim();

  // Aggiorna buffer visivo
  if (buffer) {
    bufferText.textContent = buffer;
    bufferText.classList.remove('empty');
    bufferWrap.classList.add('active');
  }

  // Reset timer — quando lo scanner smette di digitare, elabora
  clearTimeout(timer);
  timer = setTimeout(() => elabora(buffer), SCAN_TIMEOUT);
});

// Gestisce anche Invio (alcuni scanner lo mandano alla fine)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(timer);
    const val = input.value.trim();
    if (val) elabora(val);
  }
});

// ── Elaborazione codice ──────────────────────────────────────
function elabora(codice) {
  if (!codice) return;

  // Estrai driverId — accetta:
  // 1. URL completo:  https://mylogisticgroup.github.io/giro/?driver=8888
  // 2. Solo l'ID:     8888
  let driverId = codice;

  try {
    // Se è un URL valido, estrai il parametro driver
    const url = new URL(codice);
    const d   = url.searchParams.get('driver');
    if (d) driverId = d.trim();
  } catch(e) {
    // Non è un URL → usa il codice direttamente come driver ID
    driverId = codice.trim();
  }

  if (!driverId) {
    mostraFeedback('QR Code non riconosciuto.', false);
    reset();
    return;
  }

  // Aggiorna ultimo accesso
  const ora = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  lastScan.textContent = 'Ultima scansione: Driver ' + driverId + ' — ' + ora;

  mostraFeedback('✓ Driver ' + driverId + ' — apertura pagina…', true);

  // Reindirizza dopo 600ms (il driver vede il feedback)
  setTimeout(() => {
    window.location.href = BASE_URL + '?driver=' + encodeURIComponent(driverId);
  }, 600);
}

// ── Feedback visivo ──────────────────────────────────────────
function mostraFeedback(msg, ok) {
  feedback.textContent  = msg;
  feedback.className    = 'feedback ' + (ok ? 'ok' : 'err');
  feedback.style.display = 'block';
  if (!ok) setTimeout(() => { feedback.style.display = 'none'; reset(); }, 2500);
}

function reset() {
  buffer = '';
  input.value = '';
  bufferText.textContent = 'In attesa scansione…';
  bufferText.classList.add('empty');
  bufferWrap.classList.remove('active');
  setTimeout(refocus, 50);
}

// ── Orologio ─────────────────────────────────────────────────
function aggiornaClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
aggiornaClock();
setInterval(aggiornaClock, 1000);

// ── Torna alla scanner page dopo che il driver ha finito ─────
// Quando si torna su questa pagina (back/history) → reset automatico
window.addEventListener('pageshow', () => { reset(); refocus(); });
</script>
</body>
</html>
