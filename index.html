<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GiroApp</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:#eef2f7;min-height:100vh;display:flex;
         align-items:center;justify-content:center;padding:1.5rem}
    .card{background:#fff;border-radius:18px;
          box-shadow:0 4px 24px rgba(0,0,0,.09);
          padding:2rem 1.5rem;width:100%;max-width:420px;text-align:center}
    .logo{font-size:2.5rem;margin-bottom:1rem}
    h1{font-size:1.3rem;color:#0d1b2a;margin-bottom:.5rem}
    p{color:#888;font-size:.9rem;margin-bottom:1.5rem}
    .spinner{width:40px;height:40px;border:4px solid #e0e0e0;
             border-top:4px solid #1565c0;border-radius:50%;
             animation:spin 0.8s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg-err{background:#ffebee;color:#c62828;border-radius:10px;
             padding:1rem;font-size:.9rem;display:none;margin-top:1rem}
    .btn{display:none;margin-top:1rem;padding:.8rem 2rem;
         background:#1565c0;color:#fff;border:none;border-radius:12px;
         font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🚚</div>
  <h1>GiroApp</h1>
  <p>Caricamento in corso…</p>
  <div class="spinner" id="spinner"></div>
  <div class="msg-err" id="msgErr"></div>
  <a class="btn" id="btnManuale" href="#">Apri manualmente</a>
</div>
<script>
  const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxJuk67YBaoxOd_ZsEAporMcAENJ5dZBlwuQ2jjymTCBWs-axBcgP_GCTv48JhrJFPs/exec';
  const params = new URLSearchParams(window.location.search);
  const driverId = params.get('driver');
  if (!driverId) {
    mostraErr('Parametro driver mancante. Scansiona il QR code corretto.');
  } else {
    const targetUrl = WEBAPP_URL + '?driver=' + encodeURIComponent(driverId);
    const btn = document.getElementById('btnManuale');
    btn.href = targetUrl;
    setTimeout(function() { window.location.replace(targetUrl); }, 800);
    setTimeout(function() {
      btn.style.display = 'inline-block';
      document.querySelector('p').textContent = 'Se la pagina non si apre automaticamente:';
      document.getElementById('spinner').style.display = 'none';
    }, 4000);
  }
  function mostraErr(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.querySelector('p').style.display = 'none';
    var el = document.getElementById('msgErr');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
