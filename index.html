<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GiroApp</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:#eef2f7;min-height:100vh;display:flex;
         align-items:flex-start;justify-content:center;padding:1.5rem 1rem}
    .card{background:#fff;border-radius:18px;
          box-shadow:0 4px 24px rgba(0,0,0,.09);
          padding:1.8rem 1.5rem;width:100%;max-width:420px}
    .badge{display:inline-block;font-size:.72rem;font-weight:700;
           letter-spacing:.06em;padding:.25rem .8rem;border-radius:20px;
           margin-bottom:.8rem;text-transform:uppercase}
    .badge-apri{background:#e3f2fd;color:#1565c0}
    .badge-chiudi{background:#fff3e0;color:#e65100}
    h1{font-size:1.35rem;color:#0d1b2a;margin-bottom:.25rem}
    .sub{color:#666;font-size:.95rem;margin-bottom:1.6rem}
    label{display:block;font-size:.75rem;font-weight:700;color:#444;
          margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
    select{width:100%;padding:.8rem 1rem;border:2px solid #e0e0e0;
           border-radius:10px;font-size:1rem;color:#0d1b2a;background:#fafafa;
           margin-bottom:1.1rem;transition:border-color .2s;
           appearance:none;-webkit-appearance:none}
    select:focus{outline:none;border-color:#1565c0;background:#fff}
    input[type=number]{width:100%;padding:.8rem 1rem;border:2px solid #e0e0e0;
           border-radius:10px;font-size:1rem;color:#0d1b2a;background:#fafafa;
           margin-bottom:.4rem;transition:border-color .2s}
    input[type=number]:focus{outline:none;border-color:#e65100;background:#fff}
    .veicolo-detail{background:#f0f4f8;border-radius:8px;padding:.6rem .9rem;
          font-size:.88rem;color:#333;margin-top:-0.6rem;margin-bottom:1.1rem;
          display:none;line-height:1.8}
    .veicolo-detail b{color:#1565c0}
    .riepilogo{background:#f8f9fa;border:1px solid #e8e8e8;
               border-radius:12px;padding:.9rem 1.1rem;margin-bottom:1.5rem}
    .row{display:flex;justify-content:space-between;align-items:center;
         padding:.32rem 0;font-size:.9rem;border-bottom:1px solid #eee}
    .row:last-child{border-bottom:none}
    .row span:first-child{color:#777;font-weight:500}
    .row span:last-child{color:#0d1b2a;font-weight:700}
    .preview{min-height:1.3rem;font-size:.85rem;color:#555;margin-bottom:1.1rem}
    .preview .ok{color:#2e7d32;font-weight:700}
    .preview .ko{color:#c62828;font-weight:600}
    .btn-apri{display:block;width:100%;padding:.95rem;background:#1565c0;
         color:#fff;border:none;border-radius:12px;font-size:1rem;
         font-weight:700;cursor:pointer;transition:background .2s,transform .1s}
    .btn-apri:active{transform:scale(.98)}
    .btn-apri:disabled{background:#b0bec5;cursor:not-allowed}
    .btn-apri:hover:not(:disabled){background:#0d47a1}
    .btn-chiudi{display:block;width:100%;padding:.95rem;background:#e65100;
         color:#fff;border:none;border-radius:12px;font-size:1rem;
         font-weight:700;cursor:pointer;transition:background .2s,transform .1s}
    .btn-chiudi:active{transform:scale(.98)}
    .btn-chiudi:disabled{background:#b0bec5;cursor:not-allowed}
    .btn-chiudi:hover:not(:disabled){background:#bf360c}
    .spinner-wrap{text-align:center;padding:2rem}
    .spinner{width:44px;height:44px;border:4px solid #e0e0e0;
             border-top:4px solid #1565c0;border-radius:50%;
             animation:spin 0.8s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg-ok{background:#e8f5e9;color:#2e7d32;border-radius:10px;
            padding:1.2rem;text-align:center;font-weight:600;
            display:none;margin-top:1rem;line-height:1.7;font-size:.95rem}
    .msg-err{background:#ffebee;color:#c62828;border-radius:10px;
             padding:.9rem;text-align:center;font-size:.88rem;
             display:none;margin-top:1rem}
    .loading-v{text-align:center;color:#888;padding:.8rem 0;font-size:.9rem}
    #pageLoading{text-align:center;padding:3rem 1rem;color:#888}
  </style>
</head>
<body>
<div class="card">

  <!-- CARICAMENTO INIZIALE -->
  <div id="pageLoading">
    <div class="spinner"></div>
    <p>Caricamento…</p>
  </div>

  <!-- PAGINA APRI GIRO -->
  <div id="pageApri" style="display:none">
    <div class="badge badge-apri">🚚 Nuovo Giro</div>
    <h1>Buongiorno!</h1>
    <p class="sub" id="nomeApri"></p>

    <div id="formApri">
      <label>Veicolo disponibile</label>
      <p class="loading-v" id="loadingV">Caricamento veicoli…</p>
      <select id="selVeicolo" style="display:none" onchange="onVeicoloChange()">
        <option value="">— Seleziona veicolo —</option>
      </select>
      <div class="veicolo-detail" id="veicoloDetail">
        🚗 <b id="detMarcaMod"></b><br>
        📍 Km ultimo giro: <b id="detKm"></b>
      </div>
      <input type="number" id="kmInizio" style="display:none" min="0">
      <button class="btn-apri" id="btnApri" onclick="submitApri()" disabled>
        ✅ &nbsp;Apri Giro
      </button>
    </div>

    <div class="spinner-wrap" id="spinnerApri" style="display:none">
      <div class="spinner"></div>
    </div>
    <div class="msg-ok"  id="msgOkApri"></div>
    <div class="msg-err" id="msgErrApri"></div>
  </div>

  <!-- PAGINA CHIUDI GIRO -->
  <div id="pageChiudi" style="display:none">
    <div class="badge badge-chiudi">🏁 Chiudi Giro</div>
    <h1>Rientro</h1>
    <p class="sub" id="nomeChiudi"></p>

    <div class="riepilogo" id="riepilogo"></div>

    <div id="formChiudi">
      <label for="kmFine">Km attuali del veicolo</label>
      <input type="number" id="kmFine" placeholder="es. 125 650"
             min="0" inputmode="numeric" oninput="aggiornaPreview()">
      <div class="preview" id="preview"></div>
      <button class="btn-chiudi" id="btnChiudi" onclick="submitChiudi()" disabled>
        🏁 &nbsp;Chiudi Giro
      </button>
    </div>

    <div class="spinner-wrap" id="spinnerChiudi" style="display:none">
      <div class="spinner"></div>
    </div>
    <div class="msg-ok"  id="msgOkChiudi"></div>
    <div class="msg-err" id="msgErrChiudi"></div>
  </div>

  <!-- ERRORE GENERICO -->
  <div id="pageErrore" style="display:none">
    <div style="text-align:center;padding:1rem">
      <div style="font-size:2.5rem">⚠️</div>
      <h2 style="color:#c62828;margin:.5rem 0">Errore</h2>
      <p id="testoErrore" style="color:#555;font-size:.95rem"></p>
    </div>
  </div>

</div>

<script>
const WEBAPP = 'https://script.google.com/macros/s/AKfycbxJuk67YBaoxOd_ZsEAporMcAENJ5dZBlwuQ2jjymTCBWs-axBcgP_GCTv48JhrJFPs/exec';
const params   = new URLSearchParams(window.location.search);
const DRIVER_ID = params.get('driver');
let KM_INIZIO  = 0;
let TARGA_APERTA = '';

// ── Chiamata Apps Script via fetch (no redirect) ──────────
function callScript(azione, extra) {
  const url = new URL(WEBAPP);
  url.searchParams.set('action', azione);
  url.searchParams.set('driver', DRIVER_ID);
  if (extra) Object.entries(extra).forEach(([k,v]) => url.searchParams.set(k,v));
  return fetch(url.toString(), {redirect: 'follow'})
    .then(r => r.json());
}

// ── Avvio ─────────────────────────────────────────────────
window.onload = function() {
  if (!DRIVER_ID) {
    mostraErrore('QR Code non valido. Scansiona il QR corretto.');
    return;
  }
  callScript('stato')
    .then(res => {
      document.getElementById('pageLoading').style.display = 'none';
      if (res.occupato) {
        mostraChiudi(res);
      } else {
        mostraApri(res);
      }
    })
    .catch(() => mostraErrore('Errore di connessione. Riprova.'));
};

// ── Pagina APRI ───────────────────────────────────────────
function mostraApri(res) {
  document.getElementById('pageApri').style.display = 'block';
  document.getElementById('nomeApri').textContent = res.nomeDriver || '';
  caricaVeicoli();
}

function caricaVeicoli() {
  callScript('veicoli')
    .then(list => {
      const sel = document.getElementById('selVeicolo');
      document.getElementById('loadingV').style.display = 'none';
      sel.style.display = 'block';
      if (!list.length) {
        sel.innerHTML = '<option value="">Nessun veicolo disponibile</option>';
        return;
      }
      list.forEach(v => {
        const opt = document.createElement('option');
        opt.value           = v.id;
        opt.dataset.marca   = v.marca   || '';
        opt.dataset.modello = v.modello || '';
        opt.dataset.km      = v.kmFine  || '';
        opt.textContent     = v.targa;
        sel.appendChild(opt);
      });
      document.getElementById('btnApri').disabled = false;
    })
    .catch(() => {
      document.getElementById('loadingV').textContent = '⚠️ Errore caricamento veicoli.';
    });
}

function onVeicoloChange() {
  const sel    = document.getElementById('selVeicolo');
  const opt    = sel.options[sel.selectedIndex];
  const detail = document.getElementById('veicoloDetail');
  const kmInp  = document.getElementById('kmInizio');
  if (!opt.value) { detail.style.display = 'none'; kmInp.value = ''; return; }
  const marcaMod = [opt.dataset.marca, opt.dataset.modello].filter(Boolean).join(' ');
  document.getElementById('detMarcaMod').textContent = marcaMod || '—';
  const km = opt.dataset.km;
  document.getElementById('detKm').textContent = km ? Number(km).toLocaleString('it-IT') + ' km' : 'non disponibile';
  kmInp.value = km || '';
  detail.style.display = 'block';
}

function submitApri() {
  const targa = document.getElementById('selVeicolo').value;
  const km    = document.getElementById('kmInizio').value;
  if (!targa) { mostraErrApri('Seleziona un veicolo.'); return; }
  setLoadingApri(true);
  callScript('apri', { targa: targa, km: km })
    .then(res => {
      setLoadingApri(false);
      if (res.ok) {
        document.getElementById('formApri').style.display = 'none';
        const ok = document.getElementById('msgOkApri');
        ok.style.display = 'block';
        ok.innerHTML = '✅ Giro aperto!<br>Veicolo: <strong>' + targa + '</strong>';
      } else {
        mostraErrApri(res.errore || 'Errore sconosciuto.');
      }
    })
    .catch(() => { setLoadingApri(false); mostraErrApri('Errore di connessione.'); });
}

function setLoadingApri(on) {
  document.getElementById('btnApri').disabled = on;
  document.getElementById('spinnerApri').style.display = on ? 'block' : 'none';
  document.getElementById('msgErrApri').style.display = 'none';
}
function mostraErrApri(m) {
  const el = document.getElementById('msgErrApri');
  el.textContent = '⚠️ ' + m; el.style.display = 'block';
}

// ── Pagina CHIUDI ─────────────────────────────────────────
function mostraChiudi(res) {
  document.getElementById('pageChiudi').style.display = 'block';
  document.getElementById('nomeChiudi').textContent = res.nomeDriver || '';
  KM_INIZIO    = Number(res.kmInizio) || 0;
  TARGA_APERTA = res.targa || '';
  document.getElementById('riepilogo').innerHTML =
    '<div class="row"><span>Veicolo</span><span>' + res.targa + (res.adesivo ? ' ['+res.adesivo+']' : '') + '</span></div>' +
    '<div class="row"><span>Partenza</span><span>' + res.dataInizio + '</span></div>' +
    '<div class="row"><span>Km inizio</span><span>' + KM_INIZIO.toLocaleString('it-IT') + '</span></div>';
  setTimeout(() => document.getElementById('kmFine').focus(), 300);
}

function aggiornaPreview() {
  const val  = document.getElementById('kmFine').value;
  const btn  = document.getElementById('btnChiudi');
  const pre  = document.getElementById('preview');
  if (!val) { pre.innerHTML = ''; btn.disabled = true; return; }
  const dist = Number(val) - KM_INIZIO;
  if (dist < 0) {
    pre.innerHTML = '<span class="ko">⚠️ Km inferiori ai Km di partenza (' + KM_INIZIO.toLocaleString('it-IT') + ')</span>';
    btn.disabled = true;
  } else {
    pre.innerHTML = 'Km percorsi: <span class="ok">+' + dist.toLocaleString('it-IT') + ' km</span>';
    btn.disabled = false;
  }
}

function submitChiudi() {
  const km = Number(document.getElementById('kmFine').value);
  if (!km || km < KM_INIZIO) { mostraErrChiudi('Inserisci Km validi.'); return; }
  setLoadingChiudi(true);
  callScript('chiudi', { km: km })
    .then(res => {
      setLoadingChiudi(false);
      if (res.ok) {
        document.getElementById('formChiudi').style.display = 'none';
        const ok = document.getElementById('msgOkChiudi');
        ok.style.display = 'block';
        ok.innerHTML = '✅ Giro chiuso!<br>Veicolo <strong>' + res.targa +
          '</strong> è libero.<br>Km percorsi: <strong>+' +
          res.distanza.toLocaleString('it-IT') + ' km</strong><br>👋 Buon riposo!';
      } else {
        mostraErrChiudi(res.errore || 'Errore sconosciuto.');
      }
    })
    .catch(() => { setLoadingChiudi(false); mostraErrChiudi('Errore di connessione.'); });
}

function setLoadingChiudi(on) {
  document.getElementById('btnChiudi').disabled = on;
  document.getElementById('spinnerChiudi').style.display = on ? 'block' : 'none';
  document.getElementById('msgErrChiudi').style.display = 'none';
}
function mostraErrChiudi(m) {
  const el = document.getElementById('msgErrChiudi');
  el.textContent = '⚠️ ' + m; el.style.display = 'block';
}

// ── Errore generico ───────────────────────────────────────
function mostraErrore(msg) {
  document.getElementById('pageLoading').style.display = 'none';
  document.getElementById('pageErrore').style.display = 'block';
  document.getElementById('testoErrore').textContent = msg;
}
</script>
</body>
</html>
