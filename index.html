<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Giro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:     #0a0f1e;
      --muted:   #6b7280;
      --line:    #e5e7eb;
      --bg:      #f3f4f6;
      --card:    #ffffff;
      --blue:    #2563eb;
      --blue2:   #1d4ed8;
      --green:   #16a34a;
      --orange:  #ea580c;
      --red:     #dc2626;
      --r:       14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 14px 48px;
    }

    .wrap { width: 100%; max-width: 390px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding: 0 2px;
    }
    .logo {
      width: 42px; height: 42px;
      background: var(--ink);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .brand {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 2px;
    }
    .driver-name {
      font-size: 1rem; font-weight: 700; color: var(--ink);
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    }

    /* ── Pill header ── */
    .card-top {
      padding: 16px 18px 0;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: 5px 11px;
      border-radius: 20px;
    }
    .pill-blue   { background: #eff6ff; color: var(--blue); }
    .pill-orange { background: #fff7ed; color: var(--orange); }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; }
    .pill-blue   .pill-dot { background: var(--blue);   animation: blink 2s infinite; }
    .pill-orange .pill-dot { background: var(--orange); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Body ── */
    .card-body { padding: 16px 18px 20px; }

    /* ── Field ── */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: .68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .09em;
      margin-bottom: 7px; display: block;
    }

    select, input[type=number] {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .93rem;
      color: var(--ink);
      background: var(--bg);
      appearance: none; -webkit-appearance: none;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    select:focus, input[type=number]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: #fff;
    }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: .82rem;
    }

    /* ── Chip veicolo ── */
    .vei-chip {
      display: none;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 10px 12px;
      font-size: .8rem;
      color: #374151;
      line-height: 1.9;
      margin-top: 8px;
    }
    .vei-chip .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: var(--blue);
    }

    /* ── Riepilogo chiudi ── */
    .riepilogo {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: .83rem;
      color: #374151;
      line-height: 2;
      margin-bottom: 16px;
    }
    .riepilogo strong { color: var(--ink); }
    .riepilogo .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
    }

    /* ── Button ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px 14px;
      border: none; border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .93rem; font-weight: 700;
      cursor: pointer;
      transition: transform .12s, opacity .15s, background .15s;
      letter-spacing: .01em;
    }
    .btn:active  { transform: scale(.96); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-blue   { background: var(--blue);   color: #fff; }
    .btn-blue:hover:not(:disabled)   { background: var(--blue2); }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover:not(:disabled) { background: #c2410c; }
    .btn-ghost {
      background: transparent; color: var(--blue);
      border: 1.5px solid var(--blue);
      margin-top: 10px;
    }
    .btn-ghost:hover { background: #eff6ff; }

    /* ── GPS bar ── */
    .gps-bar {
      display: none;
      align-items: center; gap: 8px;
      font-size: .76rem; color: var(--muted);
      background: #f8fafc; border: 1px solid var(--line);
      border-radius: 8px; padding: 8px 12px;
      margin-bottom: 12px;
    }
    .gps-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--blue); flex-shrink: 0;
      animation: blink 1s infinite;
    }

    /* ── Skeleton ── */
    .skeleton {
      height: 44px; border-radius: 10px;
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── State screens ── */
    .state {
      display: none;
      padding: 36px 20px;
      text-align: center;
    }
    .state-icon { font-size: 2.6rem; margin-bottom: 12px; }
    .state-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .state-sub {
      font-size: .85rem; color: var(--muted);
      line-height: 1.6; margin-bottom: 4px;
    }
    .state-ok  .state-title { color: var(--green); }
    .state-err .state-title { color: var(--red); }

    /* ── Spinner ── */
    .spin-wrap {
      display: none;
      padding: 36px 20px;
      text-align: center;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--line);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-label { font-size: .82rem; color: var(--muted); }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--line); margin: 16px 0; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">🚚</div>
    <div>
      <div class="brand">My Logistic Group</div>
      <div class="driver-name" id="driverName">Caricamento…</div>
    </div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Init loading -->
    <div class="spin-wrap" id="stateInit" style="display:block">
      <div class="spinner"></div>
      <div class="spin-label">Verifica in corso…</div>
    </div>

    <!-- ── APRI GIRO ── -->
    <div id="screenApri" style="display:none">
      <div class="card-top">
        <div class="pill pill-blue">
          <span class="pill-dot"></span>Nuovo Giro
        </div>
      </div>
      <div class="card-body">

        <div class="field">
          <label class="field-label">Veicolo</label>
          <div class="skeleton" id="skelVeicolo"></div>
          <div class="select-wrap" style="display:none" id="wrapSel">
            <select id="selVeicolo" onchange="onVeicoloChange()">
              <option value="">— Seleziona veicolo —</option>
            </select>
          </div>
          <div class="vei-chip" id="veiChip"></div>
        </div>

        <div class="field" id="fieldKm" style="display:none">
          <label class="field-label">Km attuali del veicolo</label>
          <input type="number" id="kmInizio" placeholder="es. 125430" min="0" inputmode="numeric">
        </div>

        <div class="gps-bar" id="gpsBarA">
          <span class="gps-dot"></span>
          <span>Acquisizione GPS…</span>
        </div>

        <button class="btn btn-blue" id="btnApri" onclick="submitApri()" disabled>
          ✓ &nbsp;Apri Giro
        </button>

      </div>
    </div>

    <!-- ── CHIUDI GIRO ── -->
    <div id="screenChiudi" style="display:none">
      <div class="card-top">
        <div class="pill pill-orange">
          <span class="pill-dot"></span>Chiudi Giro
        </div>
      </div>
      <div class="card-body">

        <div class="riepilogo" id="riepilogo"></div>

        <div class="field">
          <label class="field-label">Km attuali del veicolo</label>
          <input type="number" id="kmFine" placeholder="es. 125850" inputmode="numeric">
        </div>

        <div class="gps-bar" id="gpsBarC">
          <span class="gps-dot"></span>
          <span>Acquisizione GPS…</span>
        </div>

        <button class="btn btn-orange" id="btnChiudi" onclick="submitChiudi()">
          ⬛ &nbsp;Chiudi Giro
        </button>

      </div>
    </div>

    <!-- Spinner operazione -->
    <div class="spin-wrap" id="spinnerOp">
      <div class="spinner"></div>
      <div class="spin-label" id="spinnerLabel">Operazione in corso…</div>
    </div>

    <!-- Successo -->
    <div class="state state-ok" id="stateOk">
      <div class="state-icon">✅</div>
      <div class="state-title" id="okTitle"></div>
      <div class="state-sub"  id="okBody"></div>
    </div>

    <!-- Errore -->
    <div class="state state-err" id="stateErr">
      <div class="state-icon">⚠️</div>
      <div class="state-title">Errore</div>
      <div class="state-sub" id="errMsg"></div>
      <button class="btn btn-ghost" onclick="location.reload()">↩ Riprova</button>
    </div>

  </div>
</div>

<script>
// ── Config — sostituisci con l'URL della tua Web App ─────────
const API = 'https://script.google.com/macros/s/TUO_DEPLOYMENT_ID/exec';

// ── Stato globale ────────────────────────────────────────────
const params     = new URLSearchParams(location.search);
const DRIVER     = (params.get('driver') || '').trim();
let   gpsCoords  = '';
let   kmInizioVal = 0;

// ── JSONP — evita CORS, una sola chiamata ────────────────────
function apiCall(qs) {
  return new Promise((resolve, reject) => {
    const cb    = '_cb' + Date.now() + Math.random().toString(36).slice(2);
    const tag   = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cb]; tag.remove();
      reject(new Error('Timeout — controlla la connessione.'));
    }, 18000);

    window[cb] = data => {
      clearTimeout(timer); delete window[cb]; tag.remove();
      resolve(data);
    };
    tag.src = API + '?' + qs + '&callback=' + cb;
    document.head.appendChild(tag);
  });
}

// ── Schermate ────────────────────────────────────────────────
const SCREENS = ['stateInit','screenApri','screenChiudi','spinnerOp','stateOk','stateErr'];
function show(id) {
  SCREENS.forEach(s => {
    const el = document.getElementById(s);
    el.style.display = (s === id) ? 'block' : 'none';
  });
}
function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  show('stateErr');
}

// ── GPS background ───────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => { gpsCoords = p.coords.latitude.toFixed(6) + ',' + p.coords.longitude.toFixed(6); },
    () => { gpsCoords = ''; },
    { timeout: 12000, maximumAge: 0, enableHighAccuracy: true }
  );
}

function waitGPS(maxMs = 2500) {
  if (gpsCoords) return Promise.resolve();
  const t0 = Date.now();
  return new Promise(res => {
    const iv = setInterval(() => {
      if (gpsCoords || Date.now() - t0 > maxMs) { clearInterval(iv); res(); }
    }, 200);
  });
}

// ── INIT — una sola chiamata che porta tutto ─────────────────
window.onload = async () => {
  if (!DRIVER) { showErr('QR Code non valido — parametro driver mancante.'); return; }

  startGPS(); // GPS parte subito in parallelo

  let data;
  try {
    // UNA SOLA chiamata: restituisce stato driver + veicoli se libero
    data = await apiCall('action=init&driver=' + encodeURIComponent(DRIVER));
  } catch(e) {
    showErr('Impossibile connettersi. Controlla la connessione e riprova.'); return;
  }

  document.getElementById('driverName').textContent = data.nomeDriver || DRIVER;

  if (data.occupato) {
    mostraChiudi(data);
  } else {
    mostraApri(data.veicoli || []);
  }
};

// ── SCHERMATA APRI ───────────────────────────────────────────
function mostraApri(veicoli) {
  show('screenApri');

  // Nasconde skeleton, mostra select
  document.getElementById('skelVeicolo').style.display = 'none';
  document.getElementById('wrapSel').style.display = 'block';

  const sel = document.getElementById('selVeicolo');

  if (!veicoli.length) {
    sel.innerHTML = '<option value="">Nessun veicolo disponibile</option>';
    return;
  }

  veicoli.forEach(v => {
    const o       = document.createElement('option');
    o.value       = v.id;
    o.dataset.marca   = v.marca   || '';
    o.dataset.modello = v.modello || '';
    o.dataset.km      = v.kmFine  !== '' ? v.kmFine : '';
    o.textContent = v.targa + (v.marca ? ' — ' + v.marca + ' ' + v.modello : '');
    sel.appendChild(o);
  });

  document.getElementById('btnApri').disabled = false;
}

function onVeicoloChange() {
  const sel   = document.getElementById('selVeicolo');
  const opt   = sel.options[sel.selectedIndex];
  const chip  = document.getElementById('veiChip');
  const fkm   = document.getElementById('fieldKm');
  const kminp = document.getElementById('kmInizio');

  if (!opt.value) {
    chip.style.display = 'none';
    fkm.style.display  = 'none';
    kminp.value = '';
    return;
  }

  const km = opt.dataset.km;
  chip.innerHTML =
    (opt.dataset.marca
      ? '🚗 <span class="mono">' + opt.dataset.marca + ' ' + opt.dataset.modello + '</span><br>'
      : '') +
    '📏 Km ultimo giro: <span class="mono">' +
      (km ? Number(km).toLocaleString('it-IT') + ' km' : 'non disponibile') +
    '</span>';
  chip.style.display = 'block';

  kminp.value       = km || '';
  fkm.style.display = 'block';
}

async function submitApri() {
  const targa = document.getElementById('selVeicolo').value;
  const km    = document.getElementById('kmInizio').value;
  if (!targa) { shakeInput('selVeicolo'); return; }

  if (!gpsCoords) {
    document.getElementById('gpsBarA').style.display = 'flex';
    await waitGPS(2500);
    document.getElementById('gpsBarA').style.display = 'none';
  }

  show('spinnerOp');
  document.getElementById('spinnerLabel').textContent = 'Apertura giro…';

  let res;
  try {
    res = await apiCall(
      'action=apri' +
      '&driver=' + encodeURIComponent(DRIVER) +
      '&targa='  + encodeURIComponent(targa) +
      '&km='     + encodeURIComponent(km || 0) +
      '&gps='    + encodeURIComponent(gpsCoords)
    );
  } catch(e) { showErr('Timeout. Riprova tra qualche secondo.'); return; }

  if (res.ok) {
    document.getElementById('okTitle').textContent = 'Giro aperto!';
    document.getElementById('okBody').innerHTML =
      '🚗 Veicolo: <strong>' + targa + '</strong><br>' +
      '📏 Km: <strong>' + Number(km || 0).toLocaleString('it-IT') + '</strong><br>' +
      (gpsCoords ? '📍 GPS registrato' : '📍 GPS non disponibile');
    show('stateOk');
  } else {
    showErr(res.errore || 'Errore sconosciuto.');
  }
}

// ── SCHERMATA CHIUDI ─────────────────────────────────────────
function mostraChiudi(stato) {
  kmInizioVal = Number(stato.kmInizio) || 0;

  document.getElementById('riepilogo').innerHTML =
    '🚗 <strong>Veicolo:</strong> ' + stato.targa +
    (stato.adesivo ? ' — ' + stato.adesivo : '') + '<br>' +
    '🕐 <strong>Inizio:</strong> ' + stato.dataInizio + '<br>' +
    '📏 <strong>Km partenza:</strong> <span class="mono">' +
      kmInizioVal.toLocaleString('it-IT') +
    '</span>';

  document.getElementById('kmFine').min = kmInizioVal;
  show('screenChiudi');
}

async function submitChiudi() {
  const km = Number(document.getElementById('kmFine').value);
  if (!km || km <= 0) { shakeInput('kmFine'); return; }
  if (km < kmInizioVal) {
    shakeInput('kmFine');
    return;
  }

  if (!gpsCoords) {
    document.getElementById('gpsBarC').style.display = 'flex';
    await waitGPS(2500);
    document.getElementById('gpsBarC').style.display = 'none';
  }

  show('spinnerOp');
  document.getElementById('spinnerLabel').textContent = 'Chiusura giro…';

  let res;
  try {
    res = await apiCall(
      'action=chiudi' +
      '&driver=' + encodeURIComponent(DRIVER) +
      '&km='     + encodeURIComponent(km) +
      '&gps='    + encodeURIComponent(gpsCoords)
    );
  } catch(e) { showErr('Timeout. Riprova tra qualche secondo.'); return; }

  if (res.ok) {
    document.getElementById('okTitle').textContent = 'Giro chiuso!';
    document.getElementById('okBody').innerHTML =
      '🚗 Veicolo: <strong>' + res.targa + '</strong><br>' +
      '📏 Distanza: <strong>' + Number(res.distanza).toLocaleString('it-IT') + ' km</strong><br>' +
      (gpsCoords ? '📍 GPS registrato' : '📍 GPS non disponibile');
    show('stateOk');
  } else {
    showErr(res.errore || 'Errore sconosciuto.');
  }
}

// ── Shake feedback errore input ──────────────────────────────
function shakeInput(id) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--red)';
  el.style.boxShadow   = '0 0 0 3px rgba(220,38,38,.15)';
  el.focus();
  setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1600);
}
</script>
</body>
</html>
